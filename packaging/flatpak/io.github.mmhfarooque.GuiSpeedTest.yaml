app-id: io.github.mmhfarooque.GuiSpeedTest
# GNOME 47 runtime — stays in sync with the CI container image. The
# runtime is past EOL (2025-10-15) but still buildable. Bump to 48 when
# bilelmoussaoui/flatpak-github-actions publishes a gnome-48 image, or
# swap to a different CI action altogether.
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: gui-speedtest

# Minimal permissions — we need network access and windowing.
# No filesystem access: the app only writes to $XDG_CACHE_HOME which Flatpak
# redirects to the sandboxed ~/.var/app/<id>/cache/ automatically.
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  # websocket-client for the M-Lab backend. Installed via pip with
  # --share=network so we don't have to vendor the tarball URL (the old
  # PyPI /packages/source/w/ pattern is deprecated and hash-path URLs
  # need manual lookup each version). For Flathub submission, replace
  # this with a flatpak-pip-generator'd sources block — Flathub's CI
  # strips network access from module builds for reproducibility.
  - name: python3-websocket-client
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation websocket-client==1.8.0

  - name: gui-speedtest
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/io.github.mmhfarooque.GuiSpeedTest.desktop
        ${FLATPAK_DEST}/share/applications/io.github.mmhfarooque.GuiSpeedTest.desktop
      - install -Dm644 data/icons/io.github.mmhfarooque.GuiSpeedTest.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.mmhfarooque.GuiSpeedTest.svg
      - install -Dm644 data/io.github.mmhfarooque.GuiSpeedTest.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/io.github.mmhfarooque.GuiSpeedTest.metainfo.xml
    sources:
      - type: dir
        path: ../..
