name: Release

# Triggered by pushing a tag like v1.0.0. Builds sdist+wheel, .deb, AppImage,
# Snap, Flatpak bundle, and RPM in parallel and attaches all artifacts to a
# GitHub Release.
#
# Individual long-tail formats (AppImage, Snap, Flatpak, RPM) are gated behind
# repo Variables so an initial tag can ship a .deb + wheel + sdist without
# failing if a store-publish credential or container isn't ready yet.
# Variables to flip once each path is verified:
#   APPIMAGE_READY = '1'  -> build + attach AppImage
#   SNAP_READY     = '1'  -> build snap; SNAP_PUBLISH=1 also pushes to
#                            Snap Store (requires SNAP_STORE_LOGIN secret)
#   FLATPAK_READY  = '1'  -> build flatpak bundle
#   RPM_READY      = '1'  -> build .rpm in a Fedora container

on:
  push:
    tags: ["v*"]

jobs:
  pypi-artifacts:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: pypi
          path: dist/*

  deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python \
            pybuild-plugin-pyproject python3-all python3-setuptools devscripts
      - name: Build package
        run: dpkg-buildpackage -us -uc -b
      - name: Collect artifacts
        run: |
          mkdir -p dist-deb
          mv ../gui-speedtest_*.deb dist-deb/ || true
      - uses: actions/upload-artifact@v7
        with:
          name: deb
          path: dist-deb/*.deb

  appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04
    # GATE: only runs when the repo has APPIMAGE_READY=1 set in repo Variables.
    if: vars.APPIMAGE_READY == '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          pip install python-appimage build
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
          # linuxdeploy continuous build — pin by SHA256 when a stable tag lands.
          wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -O linuxdeploy-plugin-gtk https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk
          sudo mv linuxdeploy linuxdeploy-plugin-gtk /usr/local/bin/
      - name: Build
        run: ./scripts/build-appimage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: dist/*.AppImage

  snap:
    name: Build Snap
    runs-on: ubuntu-24.04
    # GATE: flip SNAP_READY=1 once the snap has been validated locally.
    if: vars.SNAP_READY == '1'
    steps:
      - uses: actions/checkout@v6
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@v7
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
      # Optional auto-publish to the Snap Store. Set SNAP_PUBLISH=1 in repo
      # Variables and SNAP_STORE_LOGIN in repo Secrets (generate via
      # `snapcraft export-login`).
      - name: Publish to Snap Store (edge channel)
        if: vars.SNAP_PUBLISH == '1'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_LOGIN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge

  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-24.04
    # GATE: flatpak bundles for attaching to GitHub Releases. Flathub
    # submission is a separate per-manifest PR flow.
    if: vars.FLATPAK_READY == '1'
    # Container image is provided by the flatpak-github-actions project
    # (maintainer bilelmoussaoui). ghcr.io/flathub/flatpak-builder:gnome-47
    # does NOT exist — previous tag attempted that image and got
    # "manifest unknown" from the registry.
    container:
      # gnome-48 image isn't published on Docker Hub yet; gnome-47 still
      # pulls and builds. The GNOME 47 runtime is past EOL (as of 2025-10-15)
      # but that surfaces as a warning, not a build blocker.
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: gui-speedtest.flatpak
          manifest-path: packaging/flatpak/io.github.mmhfarooque.GuiSpeedTest.yaml
          cache-key: flatpak-builder-${{ github.sha }}

  rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-24.04
    # GATE: initial rpm build needs a final checksum in the .spec Source0;
    # flip RPM_READY=1 when ready.
    if: vars.RPM_READY == '1'
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: |
          # python3-setuptools + python3-wheel satisfy the BuildRequires
          # emitted by %pyproject_buildrequires. Without them the spec's
          # `python3dist(setuptools) >= 61` and `python3dist(wheel)`
          # bullets fail (rpmbuild exit code 11 as seen in v1.6.7).
          dnf install -y rpm-build rpmdevtools pyproject-rpm-macros \
            python3-devel python3-build python3-setuptools python3-wheel \
            python3-installer python3-pip \
            desktop-file-utils libappstream-glib git-core tar
      - name: Prepare source tarball
        run: |
          # The Fedora job runs in a container where actions/checkout doesn't
          # expose .git reliably (git archive errored with "not a git
          # repository" in previous attempts). Use `tar --transform` to
          # package the workspace directly with the gui-speedtest-VERSION/
          # prefix that the spec's Source0 line expects.
          rpmdev-setuptree
          VERSION=${GITHUB_REF_NAME#v}
          tar czf ~/rpmbuild/SOURCES/gui-speedtest-${VERSION}.tar.gz \
            --transform "s|^\.|gui-speedtest-${VERSION}|" \
            --exclude='./.git' --exclude='./__pycache__' \
            --exclude='./.pybuild' --exclude='*.egg-info' \
            --exclude='./build' --exclude='./dist' \
            --exclude='./debian/.debhelper' --exclude='./debian/gui-speedtest' \
            --exclude='./debian/files' --exclude='./debian/debhelper-build-stamp' \
            .
          cp packaging/rpm/gui-speedtest.spec ~/rpmbuild/SPECS/
      - name: Build
        run: rpmbuild -ba ~/rpmbuild/SPECS/gui-speedtest.spec
      - uses: actions/upload-artifact@v7
        with:
          name: rpm
          path: ~/rpmbuild/RPMS/noarch/*.rpm

  release:
    name: Create GitHub Release
    # Wait for every build job (gated ones that were skipped still resolve as
    # "success" under `needs:`, so this doesn't block when a gate is off).
    # `if: !cancelled()` lets the release step still run even if one of the
    # optional long-tail jobs (AppImage/Snap/RPM/Flatpak) failed — the
    # per-format glob will just skip missing artifact dirs.
    needs: [pypi-artifacts, deb, appimage, snap, flatpak, rpm]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          # Flat glob on any extension we ship — third-party actions (flatpak-
          # builder, snapcore/action-build) pick their own artifact dir names,
          # and the old per-format prefix list missed them silently. Matching
          # by extension is simpler and format-agnostic.
          files: |
            artifacts/**/*.whl
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.snap
            artifacts/**/*.flatpak
            artifacts/**/*.rpm
          fail_on_unmatched_files: false
          generate_release_notes: true
